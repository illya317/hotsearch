logging:
  version: 1
  disable_existing_loggers: false
  formatters:
    default:
      format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
      datefmt: "%Y-%m-%d %H:%M:%S"
  handlers:
    console:
      class: logging.StreamHandler
      formatter: default
      level: INFO
      stream: ext://sys.stdout
    file:
      class: logging.FileHandler
      formatter: default
      level: INFO
      filename: logs/hotsearch.log
  root:
    level: INFO
    handlers: [console, file]
